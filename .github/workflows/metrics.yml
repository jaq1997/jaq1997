name: GitHub Metrics

on:
  # Atualiza todo dia às 00:00 UTC (21:00 BRT)
  schedule:
    - cron: "0 0 * * *"
  # Permite rodar manualmente
  workflow_dispatch:
  # Atualiza a cada push no repositório do perfil
  push:
    branches: [main, master]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ─────────────────────────────────────────
      # 1. STATS GERAIS (stars, commits, PRs, issues)
      # ─────────────────────────────────────────
      - name: General Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github/metrics.svg
          base: header, activity, community, repositories
          config_timezone: America/Sao_Paulo
          config_display: large
          # Estética dark/hacker
          config_padding: 8, 10

      # ─────────────────────────────────────────
      # 2. LINGUAGENS MAIS USADAS
      # ─────────────────────────────────────────
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github/metrics.languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          config_timezone: America/Sao_Paulo

      # ─────────────────────────────────────────
      # 3. CALENDÁRIO DE COMMITS (ano completo)
      # ─────────────────────────────────────────
      - name: Commit Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github/metrics.calendar.svg
          base: ""
          plugin_calendar: yes
          plugin_calendar_limit: 1
          config_timezone: America/Sao_Paulo